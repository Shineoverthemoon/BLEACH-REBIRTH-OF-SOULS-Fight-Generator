<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bleach: Rebirth of Souls — Battle Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--soul:#00BFFF;--hollow:#9B30FF;--espada:#FF4060;--gold:#FFD060;--dark:#060810;--panel:#0A0C16;--card:#0F1220;--border:#181C30;--text:#DCE8FF;--dim:#404870;}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 14px 72px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 35% at 20% 10%,rgba(0,191,255,0.07) 0%,transparent 70%),radial-gradient(ellipse 45% 30% at 80% 85%,rgba(155,48,255,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
.header{text-align:center;position:relative;z-index:1;margin-bottom:6px;}
.title{font-family:'Rajdhani',sans-serif;font-size:clamp(1.8rem,7vw,3.8rem);font-weight:700;letter-spacing:0.1em;line-height:1;color:var(--text);text-shadow:0 0 30px rgba(0,191,255,0.35);}
.title .hollow{color:var(--hollow);}
.subtitle{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);margin-top:5px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px 18px;width:100%;max-width:800px;position:relative;z-index:1;margin-top:22px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.pill{font-size:0.67rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:#080A14;color:var(--dim);cursor:pointer;transition:all 0.12s;}
.pill:hover{border-color:var(--soul);color:var(--text);}
.pill.active{background:var(--soul);border-color:var(--soul);color:#000;}
.pill.hollow.active{background:var(--hollow);border-color:var(--hollow);color:#fff;}
.pill.espada.active{background:var(--espada);border-color:var(--espada);color:#fff;}
.pill.dlc.active{background:#00AA88;border-color:#00AA88;color:#fff;}
.btn-wrap{display:flex;justify-content:center;}
.btn-gen{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:0.12em;background:linear-gradient(135deg,#0080CC,#004499);color:#fff;border:none;border-radius:8px;padding:13px 40px;cursor:pointer;transition:transform 0.12s,box-shadow 0.15s;}
.btn-gen:hover{transform:scale(1.04);box-shadow:0 0 22px rgba(0,191,255,0.35);}
.btn-gen:active{transform:scale(0.97);}
#result{display:none;flex-direction:column;gap:14px;margin-top:20px;}
.teams-row{display:grid;grid-template-columns:1fr 44px 1fr;align-items:center;}
.fighter-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.fc-owner{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);}
.fc-name{font-family:'Rajdhani',sans-serif;font-size:clamp(1rem,3.5vw,1.5rem);font-weight:700;letter-spacing:0.05em;color:var(--text);line-height:1.2;}
.fc-tag{font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border-radius:10px;}
.fc-tag.shinigami{background:rgba(0,191,255,0.12);color:var(--soul);}
.fc-tag.hollow{background:rgba(155,48,255,0.15);color:var(--hollow);}
.fc-tag.espada{background:rgba(255,64,96,0.15);color:var(--espada);}
.fc-tag.quincy{background:rgba(255,255,255,0.08);color:#CCD8FF;}
.fc-tag.human{background:rgba(255,208,96,0.12);color:var(--gold);}
.vs-col{display:flex;align-items:center;justify-content:center;}
.vs-badge{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:0.08em;color:var(--gold);text-shadow:0 0 10px rgba(255,208,96,0.4);}
.scenario-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--soul);border-radius:10px;padding:16px 14px;}
.scenario-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--soul);margin-bottom:8px;font-weight:600;}
.scenario-text{font-size:0.86rem;line-height:1.65;color:#8898CC;}
.cursor{display:inline-block;width:2px;height:0.85em;background:var(--soul);margin-left:2px;vertical-align:text-bottom;animation:blink 0.7s steps(1) infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── TTS button ── */
.tts-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:6px 14px;cursor:pointer;
  font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;
  color:#AAA;transition:all 0.15s;margin-top:10px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.tts-btn:hover{background:rgba(255,255,255,0.1);color:#FFF;border-color:rgba(255,255,255,0.25);}
.tts-btn.playing{color:#FFD700;border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.08);}
.tts-btn.loading{opacity:0.6;cursor:wait;}
</style>
</head>
<body>
<div class="header">
  <div class="title">BLEACH: <span class="hollow">REBIRTH</span> OF SOULS</div>
  <div class="subtitle">1v1 Battle Generator — Joe vs CPU</div>
</div>
<div class="card">
  <div class="filter-row">
    <div class="pill active" data-filter="all">All</div>
    <div class="pill" data-filter="shinigami">Soul Reapers</div>
    <div class="pill" data-filter="gotei">Gotei 13</div>
    <div class="pill hollow" data-filter="hollow">Hollows</div>
    <div class="pill espada" data-filter="espada">Espada</div>
    <div class="pill" data-filter="human">Humans</div>
    <div class="pill dlc" data-filter="dlc">DLC / TYBW</div>
  </div>
  <div class="btn-wrap">
    <button class="btn-gen" id="genBtn">⚔️ RELEASE — GENERATE!</button>
  </div>
  <div id="result">
    <div class="teams-row">
      <div class="fighter-card">
        <div class="fc-owner">Joe plays</div>
        <div class="fc-name" id="nameJoe">—</div>
        <div class="fc-tag" id="tagJoe"></div>
      </div>
      <div class="vs-col"><div class="vs-badge">VS</div></div>
      <div class="fighter-card">
        <div class="fc-owner">CPU plays</div>
        <div class="fc-name" id="nameCpu">—</div>
        <div class="fc-tag" id="tagCpu"></div>
      </div>
    </div>
    <div class="scenario-box">
      <div class="scenario-label">⚡ Battle Scenario</div>
      <div class="scenario-text" id="scenarioText"></div>
      <button class="tts-btn" id="ttsBtn" onclick="(function(b){const t=document.getElementById(\'scenarioText\');speakScenario(b,t.innerText);})(this)">🔊 Read Aloud</button>
    </div>
  </div>
</div>
<script>
const ALL = [
  // Ichigo forms
  {n:"Ichigo Kurosaki",t:["shinigami","human"],role:"shinigami"},{n:"Ichigo Kurosaki (Bankai)",t:["shinigami","human"],role:"shinigami"},{n:"Ichigo Kurosaki (Final Getsuga Tensho)",t:["shinigami","human"],role:"shinigami"},
  // Humans
  {n:"Orihime Inoue",t:["human"],role:"human"},{n:"Uryu Ishida",t:["human","quincy"],role:"quincy"},{n:"Yasutora Sado (Chad)",t:["human"],role:"human"},
  // Gotei 13
  {n:"Rukia Kuchiki",t:["shinigami","gotei"],role:"shinigami"},{n:"Byakuya Kuchiki",t:["shinigami","gotei"],role:"shinigami"},{n:"Renji Abarai",t:["shinigami","gotei"],role:"shinigami"},{n:"Sosuke Aizen",t:["shinigami","gotei"],role:"shinigami"},{n:"Gin Ichimaru",t:["shinigami","gotei"],role:"shinigami"},{n:"Kaname Tosen",t:["shinigami","gotei"],role:"shinigami"},{n:"Toshiro Hitsugaya",t:["shinigami","gotei"],role:"shinigami"},{n:"Kenpachi Zaraki",t:["shinigami","gotei"],role:"shinigami"},{n:"Yoruichi Shihoin",t:["shinigami","gotei"],role:"shinigami"},{n:"Kisuke Urahara",t:["shinigami","gotei"],role:"shinigami"},{n:"Shunsui Kyoraku",t:["shinigami","gotei"],role:"shinigami"},{n:"Jushiro Ukitake",t:["shinigami","gotei"],role:"shinigami"},{n:"Rangiku Matsumoto",t:["shinigami","gotei"],role:"shinigami"},{n:"Shuhei Hisagi",t:["shinigami","gotei"],role:"shinigami"},{n:"Sajin Komamura",t:["shinigami","gotei"],role:"shinigami"},{n:"Sui-Feng",t:["shinigami","gotei"],role:"shinigami"},{n:"Izuru Kira",t:["shinigami","gotei"],role:"shinigami"},{n:"Mayuri Kurotsuchi",t:["shinigami","gotei"],role:"shinigami"},{n:"Genryusai Yamamoto",t:["shinigami","gotei"],role:"shinigami"},
  // Espada
  {n:"Ulquiorra Cifer",t:["hollow","espada"],role:"espada"},{n:"Grimmjow Jaegerjaquez",t:["hollow","espada"],role:"espada"},{n:"Nnoitra Gilga",t:["hollow","espada"],role:"espada"},{n:"Tier Halibel",t:["hollow","espada"],role:"espada"},{n:"Coyote Starrk",t:["hollow","espada"],role:"espada"},{n:"Nelliel Tu Odelschwanck",t:["hollow","espada"],role:"espada"},{n:"Szayelaporro Granz",t:["hollow","espada"],role:"espada"},
  // DLC - Season Pass
  {n:"Ichigo Kurosaki (Thousand-Year Blood War)",t:["shinigami","dlc"],role:"shinigami"},{n:"Retsu Unohana",t:["shinigami","gotei","dlc"],role:"shinigami"},{n:"Ichibe Hyosube",t:["shinigami","dlc"],role:"shinigami"},{n:"Yhwach",t:["quincy","dlc"],role:"quincy"},
];

const SCENARIOS = [
  "The Senkaimon gate collapsed mid-transit, scattering both Soul Reapers into an unstable pocket dimension between the World of the Living and the Soul Society. {A} and {B} are the only two people in it. The gate won't reopen until the combined reiatsu output from inside matches the original signature.",
  "Aizen has placed a Hogyoku fragment inside a specially constructed arena and broadcast its location to both sides simultaneously. {A} arrived from the Gotei 13's fastest route. {B} arrived from Las Noches. Whoever reaches the fragment wins the war.",
  "A Menos-class Hollow consumed a copy of the Hogyoku and evolved beyond anything catalogued. Its reiatsu is suppressing every fighter within half a mile except the two closest. {A} and {B} are the only ones who can still fight at full power.",
  "The Dangai Precipice World has malfunctioned. The Cleaner arrived three hundred years early, compressing time inside the corridor. {A} and {B} were both in transit when the lock failed. Only a reiatsu burst strong enough to blow the exit open will get them out.",
  "Kisuke Urahara rigged the training chamber to run a forced simulation when both participants exceed a reiatsu threshold simultaneously. {A} and {B} walked in separately, hit that threshold at the same moment, and now the chamber has sealed.",
  "Gin Ichimaru's Shinso was shattered during a battle, and the fragments scattered across a sealed district. Each fragment carries a pulse of killing intent that destabilizes the spiritual pressure of anyone nearby. {A} and {B} both entered the district on separate missions.",
  "Sosuke Aizen placed a Kyoka Suigetsu illusion inside a Soul Society courtroom years ago as a failsafe. It's activated. The illusion has fused with the spiritual pressure of the two highest-level combatants in the area, making {A} and {B} look identical to each other's deepest combat instinct.",
  "Yhwach's Almighty has fractured the timeline, creating a convergence point where three versions of the same battle play out simultaneously. {A} and {B} are pulled into the convergence. The version they're in determines which outcome becomes permanent.",
  "The Royal Guard's palace has been breached for the first time in recorded history. Both {A} and {B} were inside when the breach occurred. The palace's defense system has identified every reiatsu signature inside as hostile and locked the exits.",
  "Retsu Unohana has declared that the only way to unlock the true potential of the fighter standing before her is to force them into a genuine life-or-death confrontation. {A} is the fighter she selected. {B} showed up believing the same thing about {A}.",
  "The Soul Society's Central 46 issued a classified decree that no one outside the council was supposed to see. Both {A} and {B} saw it. The decree names both of them as potential threats to be neutralized. The logical move is to neutralize the other threat first.",
  "Hollowfication is spreading through a district faster than the Gotei 13 can contain it. {A} and {B} are both affected — partially, unevenly, in ways that make their reiatsu signatures appear identical to hollow sensors. They've both been flagged as the source.",
  "The zero division soul tickets only work for one person per window. Both {A} and {B} need to reach the Royal Palace before the window closes. There's one ticket. The fight to decide who uses it started before either of them consciously decided to start it.",
  "Ichibe Hyosube named something that shouldn't have been nameable. The name gave the named thing form, and that form walked into the nearest populated area and started collecting reiatsu. {A} and {B} are the two strongest sources in range. The named thing wants both of them.",
  "Fullbring resonance doesn't affect Soul Reapers the same way it affects humans. When {A} and {B} came into contact with the same Fullbring artifact, the resonance affected them differently — and the difference is expressed as overwhelming compulsion to fight each other.",
  "The Wandenreich's medallion technology has been reverse-engineered. Someone stole the design and built a device that can steal bankai. {A} and {B} both arrived at the device's location at the same moment. The device requires a blood price to operate — a fight between two shinigami-class fighters — before it grants access.",
  "Muken's lowest level isn't supposed to be accessible. {A} and {B} both ended up there through different routes, with different crimes, at the same time. The cell is infinite. The only exit is through the other prisoner.",
  "Squad Zero constructed a training scenario so realistic that the participants aren't aware it's a simulation. {A} and {B} are inside it right now. The simulation ends when one fighter's will gives out — not their body, their will. That distinction matters.",
  "A Quincy Medallion activated in the presence of two shinigami simultaneously, which it wasn't designed to do. The result is a shared bankai space where both fighters' bankai exist at the same time and interact with each other in ways nobody anticipated.",
  "The Soul King's fragments are still active. One fragment has embedded itself in the ground beneath this arena and is amplifying every reiatsu signature within range to dangerous levels. {A} and {B} were both drawn to the anomaly. Neither can safely leave while the other is also here — the fragment feeds on the tension between strong reiatsu signatures.",
  "Kenpachi challenged someone to a fight and the someone said no. Kenpachi found that unacceptable. The someone is now in this arena. The other fighter wandered in because where Kenpachi goes, fights happen, and some fighters are drawn to that like moths.",
  "The Visored's training ground has a residual hollow energy signature that doesn't dissipate. When two strong reiatsu signatures occupy the space simultaneously, the residual energy forces the hollow suppression layer off both fighters. {A} and {B} are fighting through their hollow impulses and each other.",
  "Kisuke's shop has seventeen layers of security. Sixteen of them are passive. The seventeenth is active and only activates when two non-allied high-reiatsu signatures are detected inside simultaneously. {A} and {B} are both inside Urahara's shop. The seventeenth layer just activated.",
  "Mayuri Kurotsuchi needs combat data on two specific reiatsu types interacting under stress. He engineered this encounter down to the exact arena dimensions and lighting conditions. He is watching from inside a replica Menos skeleton twenty meters above the fight.",
  "The Menos Forest doesn't usually produce this type of convergence. When it does, the spiritual pressure at the center becomes strong enough to materialize thought as physical force. {A} and {B} are both thinking the same thing — that the other is the biggest obstacle in front of them right now.",
  "Lieutenant-level reiatsu meeting Captain-level reiatsu in an unshielded space produces a pressure wave that can be felt from three districts away. The fight between {A} and {B} has already been felt. Every Soul Reaper in range is heading toward the signal. They should finish this before backup arrives.",
  "Ichigo's substitute shinigami badge resonated with something in this district and produced a reiatsu flare that pulled two strong fighters toward the same coordinates from opposite directions. The badge is on the ground between them. Both of them need it.",
  "The Soul Society's weather modification system is controlled by a device that responds to spiritual pressure. When spiritual pressure above a threshold enters the device's range, the weather responds. A storm is building. The storm gets worse the more intensely {A} and {B} fight. Neither of them is going to fight less intensely.",
  "Four days before this fight, both {A} and {B} received the same anonymous letter. The letter said the time, the location, and nothing else. Both came anyway. The person who sent the letters is somewhere in this arena watching with exactly the expression you'd expect.",
  "The boundary between the World of the Living and the Soul Society has been thinning in this location for decades. Today it reached critical thinness — thin enough that two fighters on opposite sides of it are now occupying the same space simultaneously. {A} is from one side. {B} is from the other. The boundary decides to collapse entirely in approximately fifteen minutes.",
];

const ROLE_LABELS={shinigami:'Soul Reaper',hollow:'Hollow',espada:'Espada',quincy:'Quincy',human:'Human'};
const ROLE_CLASS={shinigami:'shinigami',hollow:'hollow',espada:'espada',quincy:'quincy',human:'human'};
let activeFilter='all';
document.querySelectorAll('.pill').forEach(p=>{p.addEventListener('click',()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');activeFilter=p.dataset.filter;});});
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getPool(){return activeFilter==='all'?ALL:ALL.filter(c=>c.t.includes(activeFilter));}
function typewrite(el,text,speed=16){el.innerHTML='';let i=0;const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);const tick=()=>{if(i<text.length){el.insertBefore(document.createTextNode(text[i++]),cur);setTimeout(tick,speed);}else{cur.remove();}};tick();}
document.getElementById('genBtn').addEventListener('click',()=>{
  const pool=getPool();
  if(pool.length<2){alert('Not enough fighters. Try All.');return;}
  const s=shuffle(pool);
  const f1=s[0], f2=s.find(c=>c.n!==f1.n);
  if(!f2){alert('Need at least 2 fighters. Try All.');return;}
  const [joe,jack]=Math.random()<0.5?[f1,f2]:[f2,f1];
  document.getElementById('nameJoe').textContent=joe.n;
  document.getElementById('nameCpu').textContent=jack.n;
  const tj=document.getElementById('tagJoe');tj.textContent=ROLE_LABELS[joe.role]||joe.role;tj.className='fc-tag '+(ROLE_CLASS[joe.role]||'shinigami');
  const tk=document.getElementById('tagCpu');tk.textContent=ROLE_LABELS[jack.role]||jack.role;tk.className='fc-tag '+(ROLE_CLASS[jack.role]||'shinigami');
  document.getElementById('result').style.display='flex';
  const t=SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)];
  typewrite(document.getElementById('scenarioText'),t.replace(/\{A\}/g,joe.n).replace(/\{B\}/g,jack.n));
});
</script>

<script>
// ── TTS (OpenAI Nova via proxy) ───────────────────────────
const TTS_URL = 'https://tts-proxy-i1sn.onrender.com';
let ttsAudio = null;

async function speakScenario(btn, text) {
  // iOS audio unlock MUST happen before any await
  if (!ttsAudio) {
    ttsAudio = new Audio();
    ttsAudio.play().catch(()=>{});
    ttsAudio.pause();
  }

  // if already playing, stop it
  if (!ttsAudio.paused) {
    ttsAudio.pause();
    ttsAudio.currentTime = 0;
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('playing');
    return;
  }

  btn.textContent = '⏳ Loading...';
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const r = await fetch(TTS_URL + '/tts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text})
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    ttsAudio.src = TTS_URL + data.path;
    ttsAudio.onended = () => {
      btn.textContent = '🔊 Read Aloud';
      btn.classList.remove('playing');
    };
    ttsAudio.play();
    btn.textContent = '⏹ Stop';
    btn.classList.remove('loading');
    btn.classList.add('playing');
  } catch(e) {
    console.error('TTS error:', e);
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('loading','playing');
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
